seed: 42
device: cuda

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_context_len: 512
  max_question_len: 48
  max_answer_len: 15
  min_context_len: 20
  min_question_len: 3
  min_answer_len: 1

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-5
  warmup_ratio: 0.05
  num_epochs: 5
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  label_smoothing: 0.1
  early_stopping_patience: 3
  save_total_limit: 3

generation:
  num_beams: 6
  length_penalty: 1.1
  no_repeat_ngram_size: 3
  repetition_penalty: 1.1
  min_new_tokens: 5
  max_new_tokens: 50
  do_sample: false
  temperature: 1.0
  top_p: 0.9

evaluation:
  qa_f1_threshold: 0.8
  qa_conf_threshold: 0.35
  metrics:
    - rouge
    - bleu
    - bertscore
    - em
    - f1
