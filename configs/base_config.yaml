data:
  max_answer_len: 15
  max_context_len: 512
  max_question_len: 48
  min_answer_len: 1
  min_context_len: 20
  min_question_len: 3
  test_split: 0.1
  train_split: 0.8
  val_split: 0.1
device: cuda
evaluation:
  metrics:
  - rouge
  - bleu
  qa_conf_threshold: 0.35
  qa_f1_threshold: 0.8
generation:
  do_sample: false
  length_penalty: 1.1
  max_new_tokens: 50
  min_new_tokens: 5
  no_repeat_ngram_size: 3
  num_beams: 6
  repetition_penalty: 1.1
  temperature: 1.0
  top_p: 0.9
seed: 42
training:
  batch_size: 32
  bf16: true
  dataloader_num_workers: 4
  dataloader_pin_memory: true
  early_stopping_patience: 3
  fp16: false
  generation_num_beams: 1
  gradient_accumulation_steps: 1
  gradient_checkpointing: true
  label_smoothing: 0.05
  learning_rate: 1.5e-04
  max_grad_norm: 1.0
  num_epochs: 10
  save_total_limit: 3
  warmup_ratio: 0.1
  weight_decay: 0.01
