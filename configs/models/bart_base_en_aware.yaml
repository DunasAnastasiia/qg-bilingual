model_name: facebook/bart-base
language: en
mode: answer_aware
tokenizer_name: facebook/bart-base

base_config: ../base_config.yaml

dataset:
  name: squad_v2
  language: en
  unanswerable_ratio: 0.33

training:
  num_epochs: 5
  output_dir: ./checkpoints/bart_base_en_aware

lora:
  use_lora: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules:
    - q_proj
    - v_proj
