model_name: google/mt5-base
language: ua
mode: answer_agnostic
tokenizer_name: google/mt5-base

base_config: ../base_config.yaml

dataset:
  name: ukrainian_qa
  language: ua
  unanswerable_ratio: 0.40

training:
  num_epochs: 8
  output_dir: ./checkpoints/mt5_base_ua_agnostic

generation:
  do_sample: true
  temperature: 0.8
  top_p: 0.9

lora:
  use_lora: true
  r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules:
    - q
    - v
