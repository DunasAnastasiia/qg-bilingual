base_config: ../base_config.yaml
dataset:
  language: ua
  name: ukrainian_qa
  unanswerable_ratio: 0.4
generation:
  diversity_penalty: 0.0
  do_sample: true
  length_penalty: 1.2
  max_new_tokens: 48
  min_new_tokens: 8
  no_repeat_ngram_size: 3
  num_beam_groups: 1
  num_beams: 1
  num_return_sequences: 50
  temperature: 1.0
  top_k: 50
  top_p: 0.95
language: ua
lora:
  enabled: true
  lora_alpha: 64
  lora_dropout: 0.1
  r: 32
mode: answer_agnostic
model_name: google/mt5-base
tokenizer_name: google/mt5-base
training:
  num_epochs: 8
  output_dir: ./checkpoints/mt5_base_ua_agnostic
