base_config: ../base_config.yaml
dataset:
  language: ua
  name: ukrainian_qa
  unanswerable_ratio: 0.4
generation:
  do_sample: false
  length_penalty: 1.1
  no_repeat_ngram_size: 3
  num_beams: 10
  num_return_sequences: 10
language: ua
lora:
  enabled: true
  lora_alpha: 64
  lora_dropout: 0.1
  r: 32
mode: answer_aware
model_name: google/mt5-base
tokenizer_name: google/mt5-base
training:
  num_epochs: 10
  output_dir: ./checkpoints/mt5_base_ua_aware
