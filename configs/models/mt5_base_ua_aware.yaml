model_name: google/mt5-base
language: ua
mode: answer_aware
tokenizer_name: google/mt5-base

base_config: ../base_config.yaml

dataset:
  name: ukrainian_qa
  language: ua
  unanswerable_ratio: 0.40

training:
  num_epochs: 8
  output_dir: ./checkpoints/mt5_base_ua_aware

lora:
  enabled: true
  r: 32
  lora_alpha: 64
  lora_dropout: 0.1
