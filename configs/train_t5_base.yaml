seed: 42
language: "en"
mode: "answer_aware"
model_name: "t5-base"
data_dir: "/app/data"

data:
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  train_file: "/app/data/squad_v2/train.jsonl"
  val_file: "/app/data/squad_v2/validation.jsonl"
  min_context_len: 10
  max_context_len: 512
  min_question_len: 3
  max_question_len: 48
  min_answer_len: 1
  max_answer_len: 15

training:
  batch_size: 128
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-5
  warmup_ratio: 0.03
  num_epochs: 10
  weight_decay: 0.01
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  label_smoothing: 0.1
  early_stopping_patience: 3
  save_total_limit: 3
  output_dir: "/app/checkpoints/t5_base_en_aware"

lora:
  enabled: true
  r: 16
  alpha: 32
  dropout: 0.1

generation:
  num_beams: 5
  length_penalty: 1.1
  no_repeat_ngram_size: 3
  repetition_penalty: 1.1
  min_new_tokens: 5
  max_new_tokens: 48

qg2qa:
  qa_ckpt_en: "distilbert-base-uncased-distilled-squad"
  qa_ckpt_multi: "deepset/xlm-roberta-large-squad2"
  lang: "en"
  f1_thr: 0.8
  conf_thr: 0.35
  device: "auto"

evaluation:
  qa_f1_threshold: 0.8
  qa_conf_threshold: 0.35
  metrics:
    - rouge
    - bleu
